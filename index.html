<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>烟台·蓬莱 5日自驾游路线图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --c1:#E55A4E; --c2:#3B8ED0; --c3:#27A862; --c4:#E8971A; --c5:#8B5CF6;
  --bg:#0f172a; --surface:#1e293b; --surface2:#263549;
  --text:#e2e8f0; --muted:#94a3b8; --border:rgba(255,255,255,0.08);
  --radius:12px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;}
.app-body{display:flex;flex:1;overflow:hidden;}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.header-left h1{font-size:15px;font-weight:700;letter-spacing:.3px;}
.header-left p{font-size:11px;color:var(--muted);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.progress-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(59,142,208,.15);color:#3B8ED0;border:1px solid rgba(59,142,208,.3);}

/* ── SIDEBAR ── */
.sidebar{width:320px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-tabs{display:flex;padding:10px;gap:4px;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{flex:1;padding:5px 3px;font-size:11px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center;white-space:nowrap;}
.tab-btn:hover{background:rgba(255,255,255,.06);}
.tab-btn.active{color:#fff;font-weight:600;border-color:transparent;}
.tab-all.active{background:#334155;}
.tab-1.active{background:var(--c1);} .tab-2.active{background:var(--c2);}
.tab-3.active{background:var(--c3);} .tab-4.active{background:var(--c4);}
.tab-5.active{background:var(--c5);}
.scroll-area{flex:1;overflow-y:auto;padding:6px 10px 24px;}
.scroll-area::-webkit-scrollbar{width:3px;}
.scroll-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px;}

/* ── DAY SECTION ── */
.day-sec{margin-bottom:4px;}
.day-hd{display:flex;align-items:center;gap:8px;padding:8px 2px 4px;position:sticky;top:0;background:var(--surface);z-index:2;}
.day-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.day-info .d1{font-size:12px;font-weight:600;}
.day-info .d2{font-size:10px;color:var(--muted);}
.rain-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(59,142,208,.15);color:#3B8ED0;border:1px solid rgba(59,142,208,.25);}
/* ── WEATHER ── */
.wx-badge{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:auto;}
.wx-icon{font-size:14px;line-height:1;}
.wx-temp{font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;}
.wx-bar{display:flex;align-items:center;gap:6px;padding:3px 2px 5px 34px;flex-wrap:wrap;}
.wx-desc{font-size:10px;color:var(--muted);}
.wx-wind{font-size:10px;color:var(--muted);}
.wx-wind::before{content:'·';margin-right:4px;opacity:.4;}
.wx-tip{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(59,142,208,.15);color:#3B8ED0;border:1px solid rgba(59,142,208,.22);}

/* ── STOP ITEM ── */
.stop{display:flex;align-items:flex-start;gap:8px;padding:5px 6px 5px 2px;border-radius:8px;cursor:pointer;transition:background .15s;}
.stop:hover{background:rgba(255,255,255,.04);}
.stop.done .stop-name{text-decoration:line-through;opacity:.45;}
.stop-tl{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0;padding-top:5px;}
.stop-dot{width:9px;height:9px;border-radius:50%;border:2px solid;transition:all .2s;}
.stop-line{width:1px;background:rgba(255,255,255,.1);flex:1;min-height:14px;margin:2px 0;}
.stop-cb{width:15px;flex-shrink:0;padding-top:5px;}
.stop-cb input{width:14px;height:14px;cursor:pointer;accent-color:var(--c2);}
.stop-body{flex:1;min-width:0;}
.stop-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.type-chip{font-size:9px;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.type-attr{background:rgba(229,90,78,.18);color:#E55A4E;}
.type-food{background:rgba(232,151,26,.18);color:#E8971A;}
.type-snack{background:rgba(39,168,98,.18);color:#27A862;}
.type-stay{background:rgba(139,92,246,.18);color:#8B5CF6;}
.stop-name{font-size:12px;font-weight:500;line-height:1.35;transition:all .2s;}
.stop-time{font-size:10px;color:var(--muted);margin-top:1px;}
.stop-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-top:2px;}

/* ── SNACK PANEL (standalone block) ── */
.snack-panel{flex-shrink:0;border-top:2px solid var(--border);}
.snack-panel-hd{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;transition:background .15s;}
.snack-panel-hd:hover{background:rgba(255,255,255,.05);}
.snack-panel-icon{font-size:13px;}
.snack-panel-ttl{font-size:12px;font-weight:700;flex:1;letter-spacing:.3px;}
.snack-cnt{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(39,168,98,.15);color:#27A862;border:1px solid rgba(39,168,98,.28);font-weight:600;}
.snack-chevron{font-size:9px;color:var(--muted);transition:transform .22s;}
.snack-panel.collapsed .snack-chevron{transform:rotate(180deg);}
.snack-panel-body{overflow:hidden;transition:max-height .28s ease;}
.snack-panel.collapsed .snack-panel-body{max-height:0!important;}
.snack-panel-inner{padding:4px 10px 12px;}
.snack-panel-inner::-webkit-scrollbar{width:3px;}
.snack-panel-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
/* ── SNACK ITEMS ── */
.snack-item{display:flex;align-items:flex-start;gap:8px;padding:8px 8px 8px 4px;border-radius:8px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
.snack-item:last-child{border-bottom:none;}
.snack-item:hover{background:rgba(255,255,255,.04);}
.snack-item.done .snack-name{text-decoration:line-through;opacity:.35;}
.snack-item.done .snack-detail,.snack-item.done .snack-dish{opacity:.35;}
.stop-cb-inline{width:14px;height:14px;flex-shrink:0;cursor:pointer;accent-color:#27A862;margin-top:3px;}
.snack-content{flex:1;min-width:0;}
.snack-name-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.snack-name{font-size:12px;font-weight:600;line-height:1.3;transition:all .2s;}
.snack-area-tag{font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.08);color:var(--muted);flex-shrink:0;white-space:nowrap;}
.snack-detail{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:3px;}
.snack-dish-row{display:inline-flex;align-items:center;gap:4px;}
.snack-dish{font-size:10px;color:#27A862;font-weight:500;background:rgba(39,168,98,.1);padding:1px 6px;border-radius:4px;}
.snack-day-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── MAP ── */
.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
.legend{position:absolute;bottom:28px;right:10px;background:rgba(15,23,42,.88);border:1px solid var(--border);border-radius:10px;padding:10px 13px;z-index:800;min-width:120px;}
.legend-ttl{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase;}
.legend-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:10px;color:var(--muted);}
.l-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.l-line{width:18px;height:2px;flex-shrink:0;}
.l-dash{width:18px;height:0;border-top:2px dashed;flex-shrink:0;}

/* ── POPUP ── */
.leaflet-popup-content-wrapper{background:var(--surface)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important;}
.leaflet-popup-tip{background:var(--surface)!important;}
.leaflet-popup-content{margin:10px 12px!important;}
.pu-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.pu-tags{display:flex;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.pu-tag{font-size:10px;padding:1px 6px;border-radius:4px;}
.pu-desc{font-size:11px;color:var(--muted);line-height:1.45;}
.pu-time{font-size:10px;color:var(--muted);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}

/* ── MOBILE FLOAT TABS ── */
.mob-tabs{display:none;position:fixed;top:52px;left:0;right:0;z-index:900;padding:7px 10px;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(15,23,42,.7);backdrop-filter:blur(10px);}
.mob-tabs::-webkit-scrollbar{display:none;}
.mob-tabs .tab-btn{flex-shrink:0;padding:5px 11px;font-size:11px;}

/* ── MOBILE DRAWER ── */
.drawer{display:none;position:fixed;bottom:0;left:0;right:0;z-index:1000;background:var(--surface);border-radius:16px 16px 0 0;box-shadow:0 -4px 40px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.25,.46,.45,.94);max-height:72vh;display:flex;flex-direction:column;}
.drawer.closed{transform:translateY(calc(100% - 72px));}
.drawer-handle-wrap{padding:8px 16px 0;cursor:pointer;flex-shrink:0;}
.handle-bar{width:36px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 7px;}
.drawer-preview-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;}
.drawer-ttl{font-size:14px;font-weight:700;}
.drawer-prog{font-size:11px;color:var(--muted);}
.drawer-content-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 10px 24px;overscroll-behavior:contain;}
.drawer-content-scroll::-webkit-scrollbar{display:none;}
/* ── DAY SECTION COLLAPSE ── */
.day-hd{cursor:pointer;user-select:none;}
.day-hd:hover{background:rgba(255,255,255,.03);border-radius:6px;}
.day-chevron{font-size:10px;color:var(--muted);transition:transform .2s;margin-left:4px;}
.day-body{overflow:hidden;transition:max-height .25s ease;}
.day-body.collapsed{max-height:0!important;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .mob-tabs{display:flex;}
  .drawer{display:block;}
  .header{padding:8px 12px;}
  .header-left h1{font-size:13px;}
  .legend{bottom:80px;}
}
@media(min-width:769px){
  .mob-tabs,.drawer{display:none!important;}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <h1>烟台·蓬莱 5日自驾游路线图</h1>
      <p>6人1狗 · 北京出发 · 5月1—5日 · 方案二</p>
    </div>
    <div class="header-right">
      <div class="progress-pill" id="hdr-prog">0/0 完成</div>

  <div class="app-body">

        <div style="margin-top:7px;border-top:1px solid rgba(255,255,255,.07);padding-top:7px;">
        <div class="legend-row"><div class="l-dash" style="border-color:#E55A4E"></div>Day1路线</div>
        <div class="legend-row"><div class="l-dash" style="border-color:#3B8ED0"></div>Day2路线</div>
        <div class="legend-row"><div class="l-dash" style="border-color:#27A862"></div>Day3路线</div>
        <div class="legend-row"><div class="l-dash" style="border-color:#E8971A"></div>Day4路线</div>
        <div class="legend-row"><div class="l-dash" style="border-color:#8B5CF6"></div>Day5路线</div>
        </div>

    </div>
  </div>

  <!-- MOBILE FLOATING TABS -->
  <div class="mob-tabs" id="mob-tabs">
    <button class="tab-btn tab-all active" data-day="all">全部</button>
    <button class="tab-btn tab-1" data-day="1">Day1·出发</button>
    <button class="tab-btn tab-2" data-day="2">Day2·蓬莱→烟台</button>
    <button class="tab-btn tab-3" data-day="3">Day3·养马岛</button>
    <button class="tab-btn tab-4" data-day="4">Day4·黄金沙滩</button>
    <button class="tab-btn tab-5" data-day="5">Day5·返京</button>
  </div>

  <!-- MOBILE DRAWER -->
  <div class="drawer closed" id="mob-drawer">
    <div class="drawer-handle-wrap" id="drawer-tog">
      <div class="handle-bar"></div>
      <div class="drawer-preview-row">
        <span class="drawer-ttl">行程清单</span>
        <span class="drawer-prog" id="mob-prog">0/0 完成</span>
      </div>
    </div>
    <div class="drawer-content-scroll">
      <div id="mob-list"></div>
      <!-- Mobile standalone snack panel -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const DC = {
  1:{color:'#E55A4E',date:'5/1',wd:'周四',theme:'北京 → 蓬莱',

const TYPE_LABEL = {attr:'景点',food:'正餐',snack:'小吃/早餐',stay:'住宿'};
const TYPE_CSS   = {attr:'type-attr',food:'type-food',snack:'type-snack',stay:'type-stay'};

function markerColor(s){
  if(s.type==='stay') return '#8B5CF6';
  if(s.type==='food'||s.type==='snack') return s.type==='food'?'#E8971A':'#27A862';
  return DC[s.day].color;
}

function mkSnackIcon(s){
  const done=checked.includes(s.id), op=done?'0.38':'1';
  return L.divIcon({
    className:'',
    html:`<div style="width:22px;height:22px;background:#27A862;border-radius:50%;border:2px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.5);opacity:${op}">食</div>`,
    iconSize:[22,22],iconAnchor:[11,11],popupAnchor:[0,-13]
  });
}

function snackPopupHtml(s){
  return `<div>
    <div class="pu-name">${s.name}</div>
    <div class="pu-tags">
      <span class="pu-tag" style="background:rgba(39,168,98,.2);color:#27A862">小吃/美食</span>
      <span class="pu-tag" style="background:rgba(255,255,255,.08);color:var(--muted)">${s.area}</span>
    </div>
    <div class="pu-desc" style="user-select:all;cursor:text">${s.fullAddr}</div>
    <div class="pu-time" style="color:#27A862;border-color:rgba(39,168,98,.2)">推荐：${s.dish}</div>
  </div>`;
}

function mkIcon(s){
  const c=markerColor(s), sz=s.type==='attr'?30:24, op=checked.includes(s.id)?'0.38':'1';
  return L.divIcon({
    className:'',
    html:`<div style="width:${sz}px;height:${sz}px;background:${c};border-radius:50%;border:2.5px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:${sz>26?12:10}px;font-weight:800;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.55);opacity:${op}">${s.seq}</div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-(sz/2)-4]
  });
}

function popupHtml(s){
  const day=DC[s.day];
  return `<div>
    <div class="pu-name">${s.name}</div>
    <div class="pu-tags">
      <span class="pu-tag ${TYPE_CSS[s.type]}">${TYPE_LABEL[s.type]}</span>
      <span class="pu-tag" style="background:${day.color}22;color:${day.color}">Day${s.day}·${day.date}</span>
    </div>
    <div class="pu-desc">${s.desc}</div>
    ${s.time?`<div class="pu-time">${s.time}${s.dur?' · '+s.dur:''}</div>`:''}
  </div>`;
}

function saveChecked(){ localStorage.setItem('yt_checked',JSON.stringify(checked)); }

function getProgress(){
  const ckStops=STOPS.filter(s=>s.ck);
  const total=ckStops.length+SNACKS.length;
  const done=ckStops.filter(s=>checked.includes(s.id)).length
            +SNACKS.filter(s=>checked.includes(s.id)).length;
  return {total, done};
}

// RENDER MAP
// ═══════════════════════════════════════════════════════════
function renderMap(){
  Object.values(markerMap).forEach(m=>map.removeLayer(m)); markerMap={};
  Object.values(routeLayers).forEach(r=>map.removeLayer(r)); routeLayers={};

  const days = activeDay==='all'?[1,2,3,4,5]:[+activeDay];

  days.forEach(d=>{
    if(ROUTES[d]&&ROUTES[d].length>1){
      routeLayers[d]=L.polyline(ROUTES[d],{color:DC[d].color,weight:2.5,opacity:.7,dashArray:'7,5'}).addTo(map);
    }
    STOPS.filter(s=>s.day===d).forEach(s=>{
      const m=L.marker(s.coords,{icon:mkIcon(s)}).addTo(map)
        .bindPopup(popupHtml(s),{closeButton:false,maxWidth:220,className:'',minWidth:180});
      m.on('click',()=>{ scrollToStop(s.id); });
      markerMap[s.id]=m;
    });
  });

  // Snack markers — always show all, regardless of day filter
  Object.values(snackMarkerMap).forEach(m=>map.removeLayer(m)); snackMarkerMap={};
  SNACKS.forEach(s=>{
    const m=L.marker(s.coords,{icon:mkSnackIcon(s)}).addTo(map)
      .bindPopup(snackPopupHtml(s),{closeButton:false,maxWidth:220,minWidth:180});
    snackMarkerMap[s.id]=m;
  });

  // Fit bounds
  const pts=STOPS.filter(s=>days.includes(s.day)).map(s=>s.coords);
  if(pts.length) try{ map.fitBounds(L.latLngBounds(pts).pad(activeDay==='all'?.12:.3)); }catch(e){}
}

        <div class="day-num" style="background:${day.color}">${d}</div>

        </div>
        <div class="wx-badge">
          <span class="wx-icon">${day.wx.icon}</span>
          <span class="wx-temp">${day.wx.temp}</span>

        <span class="day-chevron" style="transform:rotate(${isCollapsed?180:0}deg)">▾</span>
      </div>
      <div class="wx-bar" style="${isCollapsed?'display:none':''}">
        <span class="wx-desc">${day.wx.desc}</span>
        <span class="wx-wind">${day.wx.wind}</span>

      </div>
      <div class="day-body ${isCollapsed?'collapsed':''}" style="max-height:${isCollapsed?'0':'2000px'}">`;
    mainStops.forEach((s,i)=>{
      const done=checked.includes(s.id), isLast=i===mainStops.length-1;
      h+=`<div class="stop ${done?'done':''}" data-sid="${s.id}">
        <div class="stop-tl">
          <div class="stop-dot" style="border-color:${day.color};background:${done?day.color:'transparent'}"></div>
          ${!isLast?'<div class="stop-line"></div>':''}
        </div>
        <div class="stop-cb">${s.ck?`<input type="checkbox" class="ck-input" ${done?'checked':''} data-sid="${s.id}"/>`:'&nbsp;'}</div>
        <div class="stop-body">
          <div class="stop-row">
            <span class="type-chip ${TYPE_CSS[s.type]}">${TYPE_LABEL[s.type]}</span>
            <span class="stop-name">${s.name}</span>
          </div>
          ${s.time?`<div class="stop-time">${s.time}${s.dur?' · '+s.dur:''}</div>`:''}
          <div class="stop-desc">${s.desc}</div>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  el.innerHTML=h;
}

function toggleDaySec(d){
  if(collapsedDays.has(d)) collapsedDays.delete(d);
  else collapsedDays.add(d);
  renderList('desk-list');

}

function wireSnackPanel(innerId){
  const inner=document.getElementById(innerId);
  if(!inner||inner.dataset.wired) return;
  inner.dataset.wired='1';
  inner.addEventListener('click',e=>{
    if(e.target.tagName==='INPUT') return;
    const item=e.target.closest('[data-sid]');
    if(!item) return;
    const sid=item.dataset.sid;
    panToItem(sid);
  });
}

function panToItem(sid){
  const s=STOPS.find(x=>x.id===sid);
  if(s&&markerMap[sid]){ map.flyTo(s.coords,13,{duration:1}); setTimeout(()=>markerMap[sid].openPopup(),900); return; }
  const sn=SNACKS.find(x=>x.id===sid);
  if(sn&&snackMarkerMap[sid]){ map.flyTo(sn.coords,15,{duration:1}); setTimeout(()=>snackMarkerMap[sid].openPopup(),900); }
}

function initSnackToggle(panelId, toggleId, bodyId){
  const panel=document.getElementById(panelId);
  const body=document.getElementById(bodyId);
  if(!panel||!body) return;
  document.getElementById(toggleId).addEventListener('click',()=>{
    const collapsed=panel.classList.toggle('collapsed');
    body.style.maxHeight=collapsed?'0':(body.scrollHeight||400)+'px';
    // recalc after render
    if(!collapsed) setTimeout(()=>{ body.style.maxHeight=body.scrollHeight+'px'; },10);
  });
}

// ═══════════════════════════════════════════════════════════
// EVENTS — single delegation, wired ONCE per container
// ═══════════════════════════════════════════════════════════

function wireContainer(containerId){
  const el=document.getElementById(containerId);
  if(!el||el.dataset.wired) return;
  el.dataset.wired='1';
  // 'change' fires after native checkbox toggle — most reliable
  el.addEventListener('change',e=>{
    const cb=e.target;
    if(!cb.classList.contains('ck-input')) return;
    const sid=cb.dataset.sid; if(!sid) return;
    if(cb.checked && !checked.includes(sid)) checked.push(sid);
    else if(!cb.checked) checked=checked.filter(x=>x!==sid);
    saveChecked();
    const isDone=cb.checked;
    document.querySelectorAll('.stop[data-sid="'+sid+'"],.snack-item[data-sid="'+sid+'"]')
      .forEach(r=>r.classList.toggle('done',isDone));
    document.querySelectorAll('input.ck-input[data-sid="'+sid+'"]')
      .forEach(c=>{ c.checked=isDone; });
    document.querySelectorAll('.stop[data-sid="'+sid+'"] .stop-dot')
      .forEach(dot=>{ const s=STOPS.find(x=>x.id===sid); dot.style.background=isDone?DC[s.day].color:'transparent'; });
    if(markerMap[sid]){ const s=STOPS.find(x=>x.id===sid); if(s) markerMap[sid].setIcon(mkIcon(s)); }
    updateProgress();
  });
  el.addEventListener('click',e=>{
    if(e.target.classList.contains('ck-input')) return;
    const row=e.target.closest('[data-sid]');
    if(!row) return;
    const sid=row.dataset.sid;
    const s=STOPS.find(x=>x.id===sid);
    if(s&&markerMap[sid]){ map.flyTo(s.coords,14,{duration:1}); setTimeout(()=>markerMap[sid].openPopup(),900); return; }
    const sn=SNACKS.find(x=>x.id===sid);
    if(sn&&snackMarkerMap[sid]){ map.flyTo(sn.coords,16,{duration:1}); setTimeout(()=>snackMarkerMap[sid].openPopup(),900); }
  });
}

function wireList(id){ wireContainer(id); }
function wireSnackPanel(id){ wireContainer(id); }

function UNUSED_onCheckClick(el, sid){
  if(checked.includes(sid)) checked=checked.filter(x=>x!==sid);
  else checked.push(sid);
  saveChecked();
  // Update UI without full re-render: just toggle classes and marker
  document.querySelectorAll(`[data-sid="${sid}"]`).forEach(row=>{
    if(row.tagName!=='INPUT') row.classList.toggle('done', checked.includes(sid));
  });
  document.querySelectorAll(`input[data-sid="${sid}"]`).forEach(cb=>{ cb.checked=checked.includes(sid); });
  document.querySelectorAll(`.stop-dot`).forEach(dot=>{
    const row=dot.closest('[data-sid]');
    if(row&&row.dataset.sid===sid){
      const s=STOPS.find(x=>x.id===sid);
      dot.style.background=checked.includes(sid)?DC[s.day].color:'transparent';
    }
  });
  if(markerMap[sid]){ const s=STOPS.find(x=>x.id===sid); if(s) markerMap[sid].setIcon(mkIcon(s)); }
  if(snackMarkerMap[sid]){ const sn=SNACKS.find(x=>x.id===sid); if(sn) snackMarkerMap[sid].setIcon(mkSnackIcon(sn)); }
  updateProgress();
}

// Row click to pan map — wired once per container
function wireList(containerId){
  const el=document.getElementById(containerId);
  if(!el||el.dataset.wired) return;
  el.dataset.wired='1';
  el.addEventListener('click',e=>{
    if(e.target.tagName==='INPUT') return; // handled by onCheckClick
    const stopEl=e.target.closest('[data-sid]');
    if(!stopEl) return;
    const sid=stopEl.dataset.sid;
    const s=STOPS.find(x=>x.id===sid);
    if(s&&markerMap[sid]){
      map.flyTo(s.coords,13,{duration:1});
      setTimeout(()=>markerMap[sid].openPopup(),900);
    }
  });
}

// Scroll sidebar to stop
function scrollToStop(sid){
  ['desk-list','mob-list'].forEach(cid=>{
    const el=document.getElementById(cid);
    if(!el) return;
    const item=el.querySelector(`[data-sid="${sid}"]`);
    if(item) item.scrollIntoView({behavior:'smooth',block:'center'});
  });
}

  const mp=document.getElementById('mob-prog'); if(mp) mp.textContent=`${done}/${total} 完成`;
}

// ═══════════════════════════════════════════════════════════
// DAY FILTER
// ═══════════════════════════════════════════════════════════
function setDay(day){
  activeDay=day;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.day===day));
  updateAll(true);
}

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>setDay(b.dataset.day)));

// ═══════════════════════════════════════════════════════════
// MOBILE DRAWER
// ═══════════════════════════════════════════════════════════
const drawer=document.getElementById('mob-drawer');
const drawerHandle=document.getElementById('drawer-tog');
drawerHandle.addEventListener('click',()=>{
  drawerOpen=!drawerOpen;
  drawer.classList.toggle('closed',!drawerOpen);
});
// Only intercept drag on the handle — not on the scrollable content
let ty0=0;
drawerHandle.addEventListener('touchstart',e=>{ty0=e.touches[0].clientY;},{passive:true});
drawerHandle.addEventListener('touchmove',e=>{
  const dy=e.touches[0].clientY-ty0;
  if(dy>50){drawerOpen=false;drawer.classList.add('closed');}
  else if(dy<-50){drawerOpen=true;drawer.classList.remove('closed');}
},{passive:true});

// ═══════════════════════════════════════════════════════════
// UPDATE ALL
// ═══════════════════════════════════════════════════════════
function updateAll(remapMarkers){
  if(remapMarkers) renderMap();
  else{ Object.keys(markerMap).forEach(sid=>{const s=STOPS.find(x=>x.id===sid);if(s) markerMap[sid].setIcon(mkIcon(s));}); }
  renderList('desk-list');
  renderList('mob-list');
  renderSnackPanel('desk-snack-inner','desk-snack-cnt');
  renderSnackPanel('mob-snack-inner','mob-snack-cnt');
  updateProgress();
  // Wire ONCE — data-wired guard prevents duplicate listeners
  wireList('desk-list');
  wireList('mob-list');
  wireSnackPanel('desk-snack-inner');
  wireSnackPanel('mob-snack-inner');
  // Recalc snack body heights if open
  ['desk-snack-panel','mob-snack-panel'].forEach(pid=>{
    const panel=document.getElementById(pid);
    if(!panel||panel.classList.contains('collapsed')) return;
    const body=panel.querySelector('.snack-panel-body');
    if(body) body.style.maxHeight=body.scrollHeight+'px';
  });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
initSnackToggle('desk-snack-panel','desk-snack-toggle','desk-snack-body');
initSnackToggle('mob-snack-panel','mob-snack-toggle','mob-snack-body');
updateAll(true);
</script>
</body>
